info:
  name: Create product
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/{{path}}"
  body:
    type: json
    data: |-
      {
        "count": 2,
        "price": 1,
        "description": "description",
        "title": "title"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
